buildscript {
    repositories {
        maven { url 'https://maven.fabric.io/public' }
    }

    dependencies {
        classpath 'io.fabric.tools:gradle:1.28.0'
    }
}
apply plugin: 'com.android.application'
apply plugin: 'com.google.gms.google-services'
apply plugin: 'com.google.firebase.crashlytics'
android {
    compileSdkVersion 29
    buildToolsVersion "29.0.3"
    defaultConfig {
        applicationId 'fr.alcyons.phimr4'
        minSdkVersion 23
        targetSdkVersion 29
        versionCode 1
        versionName "4"
        testInstrumentationRunner 'androidx.test.runner.AndroidJUnitRunner'
        multiDexEnabled true
        vectorDrawables.useSupportLibrary = true
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
    configurations.all {
        resolutionStrategy.force 'com.google.code.findbugs:jsr305:1.3.9'
    }
    productFlavors {
    }
    useLibrary 'org.apache.http.legacy'
    packagingOptions {
        exclude 'META-INF/DEPENDENCIES.txt'
        exclude 'META-INF/LICENSE.txt'
        exclude 'META-INF/NOTICE.txt'
        exclude 'META-INF/NOTICE'
        exclude 'META-INF/LICENSE'
        exclude 'META-INF/DEPENDENCIES'
        exclude 'META-INF/notice.txt'
        exclude 'META-INF/license.txt'
        exclude 'META-INF/dependencies.txt'
        exclude 'META-INF/LGPL2.1'
    }
}
configurations {
    compile.exclude group: "org.apache.httpcomponents", module: "httpclient"
}
repositories {
    mavenCentral()
    maven { url 'https://maven.fabric.io/public' }
}
dependencies {
    implementation fileTree(include: ['*.jar'], exclude: ['com.symbol.emdk.jar'], dir: 'libs')
    implementation 'androidx.swiperefreshlayout:swiperefreshlayout:1.1.0'
    androidTestCompile('androidx.test.espresso:espresso-core:3.1.0', {
        exclude group: 'com.android.support', module: 'support-annotations'
    })
    /*implementation 'org.apache.httpcomponents:httpclient-android:4.3.5.1'
    implementation 'org.apache.httpcomponents:httpcore:4.4.10'
    implementation('org.apache.httpcomponents:httpmime:4.5.6') {
        exclude module: "httpclient"
    }*/
    compile('org.apache.httpcomponents:httpmime:4.3.6') {
        exclude module: 'httpclient'
    }
    compile 'org.apache.httpcomponents:httpclient-android:4.3.5'

    compile 'com.google.api-client:google-api-client-android:1.20.0' exclude module: 'httpclient'
    compile 'com.google.http-client:google-http-client-gson:1.20.0' exclude module: 'httpclient'
    //compile 'com.android.support:appcompat-v7:26.1.0'

    //compile 'com.android.support:percent:25.3.1'

    //compile 'com.android.support:support-v4:25.3.1'

    //compile 'com.google.api-client:google-api-client:1.22.0'
    compile files('src/main/libs/activation.jar')
    compile files('src/main/libs/additionnal.jar')
    compile files('src/main/libs/mail.jar')
    implementation 'com.pubnub:pubnub-gson:4.6.5'
    //implementation 'com.google.apis:google-api-services-vision:v1-rev2-1.21.0'
    implementation 'com.google.android.gms:play-services-vision:20.1.2'
    implementation 'androidx.constraintlayout:constraintlayout:2.0.2'
    implementation 'com.mcxiaoke.volley:library:1.0.19'
    implementation 'com.google.android.material:material:1.2.1'
    implementation 'com.github.clans:fab:1.6.4'
    implementation 'com.google.firebase:firebase-messaging:20.3.0'
    implementation 'me.leolin:ShortcutBadger:1.1.16@aar'
    implementation 'com.github.gcacace:signature-pad:1.2.1'
    implementation 'com.itextpdf:itextpdf:5.4.1'
    implementation 'com.google.firebase:firebase-auth:19.4.0'
    implementation 'androidx.multidex:multidex:2.0.1'
    implementation 'com.github.aakira:expandable-layout:1.4.2@aar'
    implementation 'com.itextpdf.tool:xmlworker:5.4.1'
    implementation 'com.symbol:emdk:7.0.0'
    implementation 'com.tomer:fadingtextview:2.5'
    implementation 'com.toptoche.searchablespinner:searchablespinnerlibrary:1.3.1'
    testCompile 'junit:junit:4.12'
    implementation 'de.hdodenhof:circleimageview:2.1.0'
    implementation 'com.google.firebase:firebase-crashlytics:17.2.2'
    implementation 'com.google.firebase:firebase-analytics:17.6.0'
    implementation 'com.google.firebase:firebase-crashlytics-ndk:17.2.2'

/*    compile('com.crashlytics.sdk.android:crashlytics:17.2.0@aar') {
        transitive = true;
    }*/
}

apply plugin: 'com.google.gms.google-services'